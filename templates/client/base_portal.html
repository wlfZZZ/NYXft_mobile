<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}NYX Portal{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='client/css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='client/css/orb.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: var(--bg);
        }
        .dash-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .dash-main {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            position: relative;
            background-color: var(--bg);
            padding-bottom: 4rem; /* Safe area for scrolling */
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div id="toastContainer" class="toast-container"></div>
    <div class="nyx-sheet-overlay"></div> <!-- Global Native Sheet Overlay -->
    
    <div class="portal-wrapper">
        <!-- ════ MAIN CONTENT ════ -->
        <div class="dash-main">
            <!-- Tactical Notification System -->
            <div id="toastContainer" style="position: fixed; top: 2rem; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;"></div>

            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        function showNotify(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.style.cssText = `
                background: #000;
                color: #FFF;
                padding: 12px 24px;
                border-radius: 12px;
                font-size: 0.8rem;
                font-weight: 800;
                letter-spacing: 1px;
                text-transform: uppercase;
                box-shadow: 0 20px 40px rgba(0,0,0,0.2);
                border-left: 4px solid ${type === 'success' ? '#32D74B' : '#FF3B30'};
                animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
                pointer-events: auto;
            `;
            toast.innerHTML = `<i class="ph-bold ph-${type === 'success' ? 'check-circle' : 'warning-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'toastOut 0.4s forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
        `;
        document.head.appendChild(style);
    </script>
    <!-- Core Scripts -->
    <script src="{{ url_for('static', filename='client/js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='client/js/orb.js') }}"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(reg => console.log('NYX OS Service Worker Active'))
                    .catch(err => console.log('SW Registration Failed', err));
            });
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
