<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NYXFT | Precision Performance</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">
    <style>
        :root {
            --accent-blue: #007AFF;
            --accent-red: #FF453A;
            --text-main: #000000;
            --text-dim: #8E8E93;
            --bg-primary: #FFFFFF;
            --bg-subtle: #F2F2F7;
            --border-light: rgba(0,0,0,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ════ BACKGROUND ════ */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: -1;
            pointer-events: none;
        }

        .bg-gradient {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,122,255,0.05) 0%, transparent 70%);
            z-index: -1;
            filter: blur(40px);
        }

        /* ════ HEADER ════ */
        header {
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .brand-logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            text-decoration: none;
            color: #000;
        }
        .brand-logo span { color: var(--accent-red); }

        /* ════ MAIN ════ */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 30px;
            text-align: center;
            z-index: 5;
        }

        .eyebrow {
            font-size: 0.65rem;
            font-weight: 900;
            color: var(--accent-blue);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -3px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-desc {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-dim);
            max-width: 300px;
            margin-bottom: 40px;
            font-weight: 600;
        }

        /* ════ ACTIONS ════ */
        .actions {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 340px;
            gap: 15px;
        }

        .btn-main {
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.2s;
        }

        .btn-primary { background: #000; color: #fff; }
        .btn-primary:active { transform: scale(0.96); }

        .btn-secondary { background: var(--bg-subtle); color: #000; }
        .btn-secondary:active { transform: scale(0.96); background: #E5E5EA; }

        /* ════ FOOTER ════ */
        footer {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .socials { display: flex; gap: 24px; color: #000; font-size: 1.4rem; }
        .socials a { color: inherit; text-decoration: none; }

        .secure-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.65rem;
            font-weight: 900;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Animation */
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-gradient"></div>

    <header class="fade-in">
        <a href="/" class="brand-logo">NYX<span>FT</span></a>
    </header>

    <main class="fade-in">
        <div class="eyebrow">PRECISION PERFORMANCE</div>
        <h1 class="hero-title">Engineer<br>Your<br>Peak.</h1>
        <p class="hero-desc">The next-generation training ecosystem for tactical athletes and performance engineers.</p>
        
        <div class="actions">
            <a href="/auth?mode=signup" class="btn-main btn-primary">Initial Deployment <i class="ph-bold ph-arrow-right"></i></a>
            <a href="/auth?mode=login" class="btn-main btn-secondary">Access Portal</a>
        </div>
    </main>

    <footer class="fade-in">
        <div class="socials">
            <a href="#"><i class="ph-bold ph-instagram-logo"></i></a>
            <a href="#"><i class="ph-bold ph-x-logo"></i></a>
            <a href="#"><i class="ph-bold ph-youtube-logo"></i></a>
        </div>
        <div class="secure-tag">
            <i class="ph-fill ph-shield-check" style="color: var(--accent-blue); font-size: 1rem;"></i>
            ENCRYPTED ARCHITECTURE
        </div>
    </footer>
    <script src="{{ url_for('static', filename='client/js/app.js') }}"></script>
</body>
</html>
