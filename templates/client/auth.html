<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NYX Performance | Auth</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/client/css/auth_replica.css">
    <style>
        .auth-card {
            width: 100%;
            max-width: 380px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-left: 10px;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 20px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
        }

        .glass-input:focus {
            background: #FFFFFF;
            border-color: #000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .social-auth {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-social {
            flex: 1;
            padding: 18px;
            background: #FFFFFF;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-social:active { transform: scale(0.96); }

        .auth-footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
        }

        .auth-footer span {
            color: #000;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="toast" style="position: fixed; top: 50px; left: 20px; right: 20px; background: rgba(0,0,0,0.9); color: white; padding: 16px; border-radius: 16px; display: none; z-index: 1000; text-align: center; font-size: 0.8rem; font-weight: 700; box-shadow: 0 20px 40px rgba(0,0,0,0.2);"></div>

    <div class="vault-access-container" style="margin-top:0;">
    <!-- Tactical Splash Screen -->
    <div id="splashScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="splash-logo" style="font-size: 3rem; font-weight: 900; letter-spacing: -2px; color: #fff; position: relative;">
            NYX<span style="color: var(--accent-red);">.</span>
            <div style="position: absolute; bottom: -20px; left: 0; width: 0%; height: 2px; background: #fff; animation: logo-load 1.5s ease-out forwards;"></div>
        </div>
        <div class="boot-sequence" style="margin-top: 40px; font-family: monospace; font-size: 0.6rem; color: #333; text-align: left; width: 180px;">
            <div class="boot-line" style="animation: fade-in-line 0.1s 0.2s forwards; opacity: 0;">> INITIALIZING_CORE...</div>
            <div class="boot-line" style="animation: fade-in-line 0.1s 0.5s forwards; opacity: 0;">> SYNCING_UPLINK...</div>
            <div class="boot-line" style="animation: fade-in-line 0.1s 0.8s forwards; opacity: 0;">> SECURING_NODE_PRIMARY...</div>
            <div class="boot-line" style="animation: fade-in-line 0.1s 1.2s forwards; opacity: 0;">> PERMISSION_GRANTED_V.2026</div>
        </div>
    </div>

    <style>
        @keyframes logo-load { 0% { width: 0; } 100% { width: 100%; } }
        @keyframes fade-in-line { 0% { opacity: 0; transform: translateY(5px); } 100% { opacity: 1; transform: translateY(0); } }
        .splash-out { animation: splash-fade 0.5s ease-out forwards; pointer-events: none; }
        @keyframes splash-fade { 0% { opacity: 1; filter: blur(0); } 100% { opacity: 0; filter: blur(20px); transform: scale(1.1); } }
        .auth-in { animation: auth-reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes auth-reveal { 0% { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(10px); } 100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }
    </style>

        <div class="auth-card" style="opacity: 0;">
            <header style="text-align:center; margin-bottom: 20px;">
                <h1 class="vault-title" id="authTitle">Personnel Link</h1>
                <p class="vault-sub" id="authSub">ENTER EMAIL // SYNC UPLINK</p>
            </header>

            <div class="input-group" id="nameGroup" style="display:none;">
                <label>Full Personnel Name</label>
                <input type="text" id="name" class="glass-input" placeholder="Enter Full Name">
            </div>

            <div class="input-group">
                <label>Identification Email</label>
                <input type="email" id="email" class="glass-input" placeholder="athlete@nyxft.com">
            </div>

            <div class="input-group" id="passwordGroup" style="display:none;">
                <label>Secure Passcode</label>
                <input type="password" id="password" class="glass-input" placeholder="••••••••">
            </div>

            <div class="social-auth">
                <button class="btn-social" onclick="window.location.href='/api/auth/google'"><i class="ph-bold ph-google-logo"></i> Google</button>
                <button class="btn-social"><i class="ph-bold ph-apple-logo"></i> Apple</button>
            </div>

            <div class="action-track" style="margin-top: 20px; max-width: 100%;">
                <div class="action-thumb" id="authPill">
                    <i class="ph-bold ph-caret-right"></i>
                </div>
                <div class="action-text" id="authPillLabel">SLIDE TO SYNC</div>
            </div>

            <p class="auth-footer" id="toggleText">New Personnel? <span onclick="toggleMode()">Create Identity</span></p>
        </div>
    </div>

    <script>
        let isSignup = false;
        let isVerifying = false;
        let pendingEmail = '';

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function toggleMode() {
            if (isVerifying) return;
            isSignup = !isSignup;
            document.getElementById('authTitle').innerText = isSignup ? "Initial Deployment" : "Personnel Link";
            document.getElementById('authSub').innerText = isSignup ? "CREATE IDENTITY // JOIN NYX" : "ENTER EMAIL // SYNC UPLINK";
            document.getElementById('authPill').innerText = isSignup ? "BEGIN ENROLLMENT" : "SLIDE TO SYNC";
            document.getElementById('nameGroup').style.display = isSignup ? "flex" : "none";
            document.getElementById('passwordGroup').style.display = isSignup ? "flex" : "none";
            document.getElementById('toggleText').innerHTML = isSignup ? 
                "Already Linked? <span onclick='toggleMode()'>Access Portal</span>" : 
                "New Personnel? <span onclick='toggleMode()'>Create Identity</span>";
        }

        function showVerificationState(email) {
            isVerifying = true;
            pendingEmail = email;
            
            // Hide all input groups
            document.getElementById('nameGroup').style.display = 'none';
            document.getElementById('passwordGroup').style.display = 'none';
            document.querySelectorAll('.input-group').forEach(group => {
                if(group.id !== 'verifyGroup') group.style.display = 'none';
            });
            document.querySelector('.social-auth').style.display = 'none';
            document.getElementById('toggleText').style.display = 'none';

            // Create verification group with Native Numpad Trigger
            if (!document.getElementById('verifyGroup')) {
                const authCard = document.querySelector('.auth-card');
                const verifyGroup = document.createElement('div');
                verifyGroup.className = 'input-group';
                verifyGroup.id = 'verifyGroup';
                verifyGroup.innerHTML = `
                    <label>Identity Verification Pulse</label>
                    <input type="text" id="pulseCode" class="glass-input" 
                           placeholder="000000" 
                           inputmode="numeric" 
                           pattern="[0-9]*" 
                           maxlength="6" 
                           style="text-align: center; letter-spacing: 12px; font-size: 2rem; font-weight: 800; margin-top: 20px;">
                    
                    <p style="font-size: 0.65rem; color: var(--text-dim); margin-top: 30px; text-align: center; font-weight: 700;">ENTER THE 6-DIGIT CODE SENT TO:<br><span style="color: #000;">${email}</span></p>
                `;
                const actionTrack = document.querySelector('.action-track');
                authCard.insertBefore(verifyGroup, actionTrack);
                
                // Auto-focus the input
                setTimeout(() => document.getElementById('pulseCode').focus(), 400);
            }

            document.getElementById('authTitle').innerText = "Security Pulse";
            document.getElementById('authSub').innerText = "VERIFY IDENTITY // UPLINK ACTIVE";
            document.getElementById('authPill').innerText = "CONFIRM CODE";
        }

        async function processAuth() {
            if (isVerifying) {
                return verifyPulse();
            }

            const email = document.getElementById('email').value.trim();
            const password = isSignup ? document.getElementById('password').value.trim() : 'NOT_REQUIRED';
            const name = isSignup ? document.getElementById('name').value.trim() : 'NOT_REQUIRED';

            if (!email || (isSignup && (!password || !name))) {
                return showToast('DATA FIELDS INCOMPLETE');
            }

            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
                    },
                    body: JSON.stringify({ 
                        action: isSignup ? 'signup' : 'login',
                        email, password, name
                    })
                });
                const data = await res.json();
                if (data.success) {
                    if (data.requires_verification) {
                        showToast('SECURITY PULSE SENT');
                        showVerificationState(email);
                    } else if (data.redirect) {
                        window.location.href = data.redirect;
                    }
                } else {
                    if (!isSignup && res.status === 404) {
                        showToast('IDENTITY NOT FOUND. INITIALIZING ENROLLMENT.');
                        setTimeout(() => toggleMode(), 500);
                    } else {
                        showToast(data.error || 'AUTHENTICATION REJECTED');
                    }
                }
            } catch (e) { showToast('UPLINK CONNECTION FAILED'); }
        }

        async function verifyPulse() {
            const code = document.getElementById('pulseCode').value.trim();
            if (code.length !== 6) return showToast('INVALID PULSE FORMAT');

            try {
                const res = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
                    },
                    body: JSON.stringify({ 
                        email: pendingEmail,
                        code: code
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('IDENTITY VERIFIED // REDIRECTING');
                    setTimeout(() => window.location.href = data.redirect || '/dashboard', 300);
                } else {
                    showToast(data.error || 'INVALID PULSE CODE');
                    // Shake the input
                    document.getElementById('pulseCode').style.borderColor = 'var(--error-red)';
                    setTimeout(() => document.getElementById('pulseCode').style.borderColor = '', 1000);
                }
            } catch (e) { showToast('SIGNAL INTERRUPTED'); }
        }

        function initSlider() {
            const track = document.querySelector('.action-track');
            const pill = document.querySelector('.action-thumb');
            const instruct = document.querySelector('.action-text');
            let isDragging = false;
            let startX = 0;
            
            // Re-calculate maxSlide dynamically in case of window resizing
            const getMaxSlide = () => track.offsetWidth - pill.offsetWidth - 12;

            const onStart = (e) => {
                isDragging = true;
                startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                pill.style.transition = 'none';
            };

            const onMove = (e) => {
                if (!isDragging) return;
                const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let delta = x - startX;
                const maxSlide = getMaxSlide();
                delta = Math.max(0, Math.min(delta, maxSlide));
                pill.style.transform = `translateX(${delta}px)`;
                instruct.style.opacity = 1 - (delta / maxSlide);
            };

            const onEnd = () => {
                if (!isDragging) return;
                isDragging = false;
                pill.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
                const currentPos = parseInt(pill.style.transform.replace('translateX(', '').replace('px)', '')) || 0;
                const maxSlide = getMaxSlide();

                if (currentPos > maxSlide * 0.8) {
                    pill.style.transform = `translateX(${maxSlide}px)`;
                    processAuth();
                    setTimeout(() => {
                        pill.style.transform = 'translateX(0)';
                        instruct.style.opacity = '1';
                    }, 1000);
                } else {
                    pill.style.transform = 'translateX(0)';
                    instruct.style.opacity = '1';
                }
            };

            pill.addEventListener('mousedown', onStart);
            pill.addEventListener('touchstart', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove);
            window.addEventListener('mouseup', onEnd);
            window.addEventListener('touchend', onEnd);
        }

        window.onload = () => {
            initSlider();
            const params = new URLSearchParams(window.location.search);
            if (params.get('mode') === 'signup') {
                toggleMode();
            }

            // Splash Transition Lifecycle (ALWAYS plays on /auth)
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                const card = document.querySelector('.auth-card');
                
                splash.classList.add('splash-out');
                card.classList.add('auth-in');
                
                setTimeout(() => splash.remove(), 500);
            }, 2000); 
        };
    </script>
</body>
</html>
